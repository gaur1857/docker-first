# this is the name of workflow that will be displayed in the action tab
name: CICD

# manual trigger workflow
on:
  workflow_dispatch:

jobs:

  code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        run: echo "Code Clone from Github"

  build:
    runs-on: ubuntu-latest
    needs: code
    steps:
      - name: Build Docker container
        run: echo "Docker container build"

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Test the container
        run: echo "Testing the container"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploying the app
        run: echo "Docker compose deployed the app"
